name: Release Verification

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke Test Release Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            protobuf-compiler libprotobuf-dev libheif-dev libjxl-dev \
            liblcms2-dev libexif-dev libtiff-dev libpng-dev ninja-build

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Verify version
        run: |
          ./target/release/photopipeline --version
          ./target/release/photopipeline --help

      - name: Verify plugin list
        run: ./target/release/photopipeline plugin list

      - name: Verify pipeline validation
        run: |
          cat > /tmp/test_pipeline.toml << 'EOF'
          [metadata]
          name = "Smoke Test"
          version = "1.0"
          [[nodes]]
          id = "transform"
          plugin = "photopipeline.plugins.transform"
          enabled = true
          EOF
          ./target/release/photopipeline pipeline validate -c /tmp/test_pipeline.toml
