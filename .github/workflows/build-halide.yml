name: Build Halide

on:
  push:
    paths:
      - 'halide_generators/**'
      - 'crates/halide/**'
  pull_request:
    paths:
      - 'halide_generators/**'
      - 'crates/halide/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Halide (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Halide (Linux)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y halide || sudo add-apt-repository -y ppa:kubuntu-ppa/backports && sudo apt-get update && sudo apt-get install -y halide || true

      - name: Install Halide (macOS)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: brew install halide || true

      - name: Install Halide (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: bash
        run: choco install -y halide --no-progress || true

      - name: Cache Halide build
        uses: actions/cache@v4
        with:
          path: halide_generators/build
          key: halide-${{ matrix.os }}-${{ github.sha }}
          restore-keys: |
            halide-${{ matrix.os }}-

      - name: Build Halide generators
        continue-on-error: true
        run: |
          cd halide_generators
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --parallel

      - name: Upload Halide artifacts
        uses: actions/upload-artifact@v4
        with:
          name: halide-${{ matrix.os }}
          path: halide_generators/build/
          retention-days: 90
