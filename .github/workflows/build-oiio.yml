name: Build OIIO

on:
  push:
    paths:
      - 'crates/oiio/**'
  pull_request:
    paths:
      - 'crates/oiio/**'
  workflow_dispatch:

jobs:
  build:
    name: Build OIIO (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install OIIO (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenimageio-dev

      - name: Install OIIO (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openimageio

      - name: Build OIIO crate
        run: |
          cd crates/oiio && cargo build --features oiio
