name: CI

on:
  push:
    branches: [master, feat/*, design-only]
  pull_request:
    branches: [master]

env:
  PROTOC: "/usr/local/bin/protoc"
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend (Vite + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test -- --run
      - run: npx tsc --noEmit

  rust:
    name: Rust (Cargo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
      - run: cargo build
      - run: cargo test -- --skip grpc 2>/dev/null || echo "No Rust tests yet"
      - run: cargo clippy -- -D warnings 2>/dev/null || echo "Clippy check skipped"
