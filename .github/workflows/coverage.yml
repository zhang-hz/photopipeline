name: Coverage

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  coverage:
    name: Code Coverage & Stress Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            protobuf-compiler libprotobuf-dev libheif-dev libjxl-dev \
            liblcms2-dev libexif-dev libtiff-dev libpng-dev libopenexr-dev \
            ninja-build

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests (single-threaded for stability)
        run: cargo test --workspace -- --test-threads=1

      - name: Stress test (run tests 5 times)
        run: |
          for i in 1 2 3 4 5; do
            echo "=== Iteration $i ===" >> test-output.txt
            cargo test --workspace -- --test-threads=1 2>&1 | tee -a test-output.txt
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "Stress test failed at iteration $i" >> test-output.txt
              exit 1
            fi
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-results
          path: test-output.txt
