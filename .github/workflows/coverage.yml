name: Code Coverage

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            protobuf-compiler libprotobuf-dev libheif-dev libjxl-dev \
            liblcms2-dev libexif-dev libtiff-dev libpng-dev libopenexr-dev \
            ninja-build

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage with tarpaulin
        run: cargo tarpaulin --workspace --out Xml --output-dir coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: coverage
          fail_ci_if_error: true

      - name: Run tests single-threaded
        run: cargo test --workspace -- --test-threads=1

      - name: Stress test (10 iterations)
        run: |
          for i in $(seq 1 10); do
            echo "=== Iteration $i / 10 ==="
            cargo test --workspace -- --test-threads=1 || {
              echo "FAIL: Flaky test detected on iteration $i"
              exit 1
            }
          done
