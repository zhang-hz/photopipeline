name: CI (Release)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache vendor builds
        uses: actions/cache@v4
        with:
          path: vendor/install/
          key: vendor-linux-${{ hashFiles('vendor/build-all.sh') }}
          restore-keys: vendor-linux-
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake pkg-config \
            curl nasm ninja-build protobuf-compiler
      - name: Build vendor libraries
        run: |
          chmod +x vendor/build-all.sh
          ./vendor/build-all.sh
      - name: Build release
        run: |
          export PKG_CONFIG_PATH="$PWD/vendor/install/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export RUSTFLAGS="-L $PWD/vendor/install/lib ${RUSTFLAGS:-}"
          cargo build --profile ci --workspace
      - name: Collect libraries
        run: |
          chmod +x scripts/collect-libs.sh
          mkdir -p release/bin release/lib
          cp target/ci/photopipeline-cli release/bin/
          ./scripts/collect-libs.sh target/ci/photopipeline-cli release/lib/
      - name: Smoke test
        run: |
          export LD_LIBRARY_PATH="$PWD/release/lib:${LD_LIBRARY_PATH:-}"
          ./release/bin/photopipeline-cli --version
          ./release/bin/photopipeline-cli --help
          cat > /tmp/test_pipeline.toml << 'EOF'
          [metadata]
          name = "Smoke Test"
          version = "1.0"
          [[nodes]]
          id = "transform"
          plugin = "photopipeline.plugins.transform"
          enabled = true
          EOF
          LD_LIBRARY_PATH="$PWD/release/lib" ./release/bin/photopipeline-cli pipeline validate -c /tmp/test_pipeline.toml
      - name: Package
        run: tar -czf "photopipeline-${{ github.ref_name }}-linux-x86_64.tar.gz" -C release .
      - uses: actions/upload-artifact@v4
        with:
          name: photopipeline-linux
          path: photopipeline-${{ github.ref_name }}-linux-x86_64.tar.gz

  release-macos:
    name: Release (macOS)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache vendor builds
        uses: actions/cache@v4
        with:
          path: vendor/install/
          key: vendor-macos-${{ hashFiles('vendor/build-all.sh') }}
          restore-keys: vendor-macos-
      - name: Install build tools
        run: brew install cmake pkg-config curl nasm ninja protobuf
      - name: Build vendor libraries
        run: |
          chmod +x vendor/build-all.sh
          ./vendor/build-all.sh
      - name: Build release
        run: |
          export PKG_CONFIG_PATH="$PWD/vendor/install/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export RUSTFLAGS="-L $PWD/vendor/install/lib ${RUSTFLAGS:-}"
          cargo build --profile ci --workspace
      - name: Create app bundle
        run: |
          mkdir -p "Photopipeline.app/Contents/MacOS"
          mkdir -p "Photopipeline.app/Contents/Frameworks"
          cp target/ci/photopipeline-cli "Photopipeline.app/Contents/MacOS/"
          ./scripts/collect-libs.sh "Photopipeline.app/Contents/MacOS/photopipeline-cli" "Photopipeline.app/Contents/Frameworks"
      - name: Smoke test
        run: |
          DYLD_LIBRARY_PATH="Photopipeline.app/Contents/Frameworks" \
          ./Photopipeline.app/Contents/MacOS/photopipeline-cli --version
      - name: Package DMG
        run: |
          hdiutil create -volname Photopipeline \
            -srcfolder Photopipeline.app \
            -ov -format UDZO \
            "photopipeline-${{ github.ref_name }}-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: photopipeline-macos
          path: photopipeline-${{ github.ref_name }}-macos.dmg

  release-windows:
    name: Release (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Setup vcpkg
        run: |
          $vcpkgPath = "$env:VCPKG_INSTALLATION_ROOT"
          if (-not $vcpkgPath) {
            $vcpkgPath = "C:/vcpkg"
            if (-not (Test-Path $vcpkgPath)) {
              git clone https://github.com/microsoft/vcpkg $vcpkgPath
              & $vcpkgPath/bootstrap-vcpkg.bat
            }
          }
          echo "VCPKG_ROOT=$vcpkgPath" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows" >> $env:GITHUB_ENV
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-release-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-release-
      - name: Install C libraries via vcpkg
        run: '& "$env:VCPKG_ROOT/vcpkg.exe" install --clean-after-build'
      - name: Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-registry-
      - name: Build Rust binaries
        run: cargo build --profile ci --workspace
      - name: Publish GUI
        run: |
          dotnet publish gui/windows/Photopipeline/Photopipeline.csproj `
            -c Release -p:Platform=x64 -r win-x64 `
            -o publish/win-x64 --self-contained `
            -p:WindowsAppSDKSelfContained=true
      - name: Stage package
        run: powershell -File scripts/stage.ps1
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts/installer/photopipeline.iss'
      - name: Sign
        if: env.SIGNING_CERTIFICATE_B64 != ''
        env:
          SIGNING_CERTIFICATE_B64: ${{ secrets.SIGNING_CERTIFICATE_B64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_B64)
          [IO.File]::WriteAllBytes("codesign.pfx", $pfxBytes)
          Get-ChildItem -Recurse -Include "*.exe","*.dll" -Path "staging" | ForEach-Object {
            signtool sign /fd SHA256 /f codesign.pfx /p $env:SIGNING_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td SHA256 /v $_.FullName
          }
          Get-ChildItem "dist/*.exe" | ForEach-Object {
            signtool sign /fd SHA256 /f codesign.pfx /p $env:SIGNING_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td SHA256 /v $_.FullName
          }
          Remove-Item codesign.pfx
      - name: Create portable zip
        run: |
          Compress-Archive -Path staging\* `
            -DestinationPath "dist/photopipeline-${{ github.ref_name }}-windows-x64-portable.zip"
      - name: Smoke test (CLI)
        run: |
          $env:PATH = "$pwd\staging;$env:PATH"
          .\staging\photopipeline-cli.exe --version
      - uses: actions/upload-artifact@v4
        with:
          name: photopipeline-windows-x64-portable
          path: dist/photopipeline-*-windows-x64-portable.zip
      - uses: actions/upload-artifact@v4
        with:
          name: photopipeline-windows-x64-installer
          path: dist/*-setup.exe

  publish:
    name: Publish Release
    needs: [release-linux, release-macos, release-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Photopipeline ${{ github.ref_name }}"
          files: photopipeline-*/*
          generate_release_notes: true
