name: CI (Release)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release-windows:
    name: Release (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup vcpkg
        run: |
          $vcpkgPath = "$env:VCPKG_INSTALLATION_ROOT"
          if (-not $vcpkgPath) {
            $vcpkgPath = "C:/vcpkg"
            if (-not (Test-Path $vcpkgPath)) {
              git clone https://github.com/microsoft/vcpkg $vcpkgPath
              & $vcpkgPath/bootstrap-vcpkg.bat
            }
          }
          echo "VCPKG_ROOT=$vcpkgPath" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows" >> $env:GITHUB_ENV
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-release-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-release-
      - name: Install C libraries via vcpkg
        run: '& "$env:VCPKG_ROOT/vcpkg.exe" install --clean-after-build'
      - name: Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-registry-
      - name: Build Rust binaries
        run: cargo build --profile ci --workspace --features "libheif-native,libjxl-native,libraw-native"
      - name: Stage package
        run: powershell -File scripts/stage.ps1
      - name: Run E2E Suite
        run: |
          $env:PATH = "$pwd\staging;$env:PATH"
          .\target\ci\photopipeline-e2e-runner.exe --binary .\staging\photopipeline.exe --categories all --output-dir test_output --report e2e_report.json || $true
      - name: Upload E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e_report.json
      - name: Create portable zip
        run: |
          Compress-Archive -Path staging\* `
            -DestinationPath "dist/photopipeline-${{ github.ref_name }}-windows-x64-portable.zip"
      - name: Smoke test
        run: |
          $env:PATH = "$pwd\staging;$env:PATH"
          .\staging\photopipeline.exe --version
      - uses: actions/upload-artifact@v4
        with:
          name: photopipeline-windows-x64-portable
          path: dist/photopipeline-*-windows-x64-portable.zip

  publish:
    name: Publish Release
    needs: [release-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Photopipeline ${{ github.ref_name }}"
          files: photopipeline-*/*
          generate_release_notes: true
