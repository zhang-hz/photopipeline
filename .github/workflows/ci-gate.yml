name: CI Gate (All Checks Summary)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  quick-check:
    name: Quick Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            protobuf-compiler libprotobuf-dev libheif-dev libjxl-dev \
            liblcms2-dev libexif-dev libtiff-dev libpng-dev ninja-build

      - name: Build all crates
        run: cargo build --workspace

      - name: Run all tests
        run: cargo test --workspace --no-fail-fast 2>&1 | tee test-output.txt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        continue-on-error: true
        run: cargo clippy --workspace

      - name: Show test summary
        if: always()
        run: |
          echo "=== TEST RESULTS ==="
          grep "test result:" test-output.txt || echo "No results found"
          echo ""
          echo "=== FAILURES ==="
          grep "FAILED" test-output.txt || echo "No failures"

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-test-output
          path: test-output.txt
