name: CI (Main)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test-linux:
    uses: ./.github/workflows/_test-rust.yml
    with:
      os: ubuntu-latest
      cache-prefix: main-linux

  test-macos:
    uses: ./.github/workflows/_test-rust.yml
    with:
      os: macos-latest
      cache-prefix: main-macos

  test-windows:
    uses: ./.github/workflows/_test-rust.yml
    with:
      os: windows-latest
      cache-prefix: main-windows
      timeout: 30

  gui-test:
    uses: ./.github/workflows/_test-gui.yml
    with:
      include-ui-auto: false

  stress:
    name: Stress Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stress-${{ hashFiles('Cargo.lock') }}"
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake pkg-config \
            libheif-dev libjxl-dev liblcms2-dev libtiff-dev libpng-dev ninja-build
      - name: Build
        run: cargo build --workspace
      - name: Stress test (5 iterations)
        run: |
          for i in 1 2 3 4 5; do
            echo "=== Stress iteration $i/5 ==="
            cargo test --workspace -- --test-threads=1 || exit 1
          done
