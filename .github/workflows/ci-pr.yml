name: CI (PR)

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test-linux:
    uses: ./.github/workflows/_test-rust.yml
    with:
      os: ubuntu-latest
      cache-prefix: pr-linux

  test-macos:
    uses: ./.github/workflows/_test-rust.yml
    with:
      os: macos-latest
      cache-prefix: pr-macos

  test-windows:
    uses: ./.github/workflows/_test-rust.yml
    with:
      os: windows-latest
      cache-prefix: pr-windows
      timeout: 30

  gui-test:
    uses: ./.github/workflows/_test-gui.yml
    with:
      include-ui-auto: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit

  bench-compile:
    name: Bench Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "bench-${{ hashFiles('Cargo.lock') }}"
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake pkg-config \
            protobuf-compiler libprotobuf-dev \
            libheif-dev libjxl-dev liblcms2-dev libtiff-dev libpng-dev ninja-build
      - name: Compile benchmarks only
        run: cargo bench --workspace --no-run
