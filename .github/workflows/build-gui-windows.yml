name: Build Windows GUI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    name: Build Windows GUI
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Windows App SDK workload
        run: dotnet workload install windows

      - name: Restore NuGet packages
        run: dotnet restore gui/windows/Photopipeline/Photopipeline.csproj

      - name: Build WinUI project
        run: dotnet build gui/windows/Photopipeline/Photopipeline.csproj -c Release --no-restore

      - name: Run GUI unit tests
        run: dotnet test gui/windows/Photopipeline.Tests/Photopipeline.Tests.csproj -c Release --no-build || true

      - name: Start WinAppDriver
        run: |
          & "C:\Program Files (x86)\Windows Application Driver\WinAppDriver.exe" &
          Start-Sleep -Seconds 5

      - name: Run UI automation tests
        run: dotnet test gui/windows/Photopipeline.UIAutomationTests/Photopipeline.UIAutomationTests.csproj -c Release -l "trx;LogFileName=ui-test-results.trx" || true

      - name: Publish application
        run: dotnet publish gui/windows/Photopipeline/Photopipeline.csproj -c Release -o publish/win-x64/ --no-build || true

      - name: Upload publish artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photopipeline-windows-gui
          path: publish/win-x64/
